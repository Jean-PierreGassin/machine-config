# ============================================================
# General behavior
# ============================================================
set-option -g history-limit 10000
set-option -g mouse on
set-option -g allow-rename off

# Use whatever the invoking shell's $SHELL is, rather than a
# hardcoded path. /bin/zsh happens to work on macOS and on
# usrmerge'd Linux (Ubuntu/WSL), but isn't guaranteed on every
# distro, so $SHELL is the portable choice.
set-option -g default-shell $SHELL

# ============================================================
# Copy mode
# ============================================================
set-window-option -g mode-keys vi

# ============================================================
# Pane splitting & navigation
# ============================================================
# split panes using | and -
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# switch panes using Alt-arrow without prefix
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# ============================================================
# Prefix key
# ============================================================
# remap prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# ============================================================
# Terminal / color support
# ============================================================
if-shell 'infocmp -x tmux-256color >/dev/null 2>&1' \
  'set -g default-terminal "tmux-256color"' \
  'set -g default-terminal "screen-256color"'
